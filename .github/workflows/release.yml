name: Release

on:
  push:
    tags:
      - "v[0-9]*"

jobs:
  # Creates the draft release first so build jobs can upload to it in parallel.
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Wavesplit ${{ github.ref_name }}" \
            --generate-notes \
            --draft

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            friendly: macos-arm64
            bundles: dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            friendly: macos-x86_64
            bundles: dmg
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            friendly: linux-x86_64
            bundles: appimage,deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            friendly: windows-x86_64
            bundles: nsis

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            ffmpeg

      # ── Sidecar binaries ──────────────────────────────────────────────────────

      - name: Download sidecar binaries (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p src-tauri/binaries
          # yt-dlp (universal macOS binary works for both arm64 and x86_64)
          curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o src-tauri/binaries/yt-dlp-${{ matrix.target }}
          chmod +x src-tauri/binaries/yt-dlp-${{ matrix.target }}
          # ffmpeg + ffprobe
          brew install ffmpeg
          cp "$(which ffmpeg)" src-tauri/binaries/ffmpeg-${{ matrix.target }}
          cp "$(which ffprobe)" src-tauri/binaries/ffprobe-${{ matrix.target }}

      - name: Download sidecar binaries (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir -p src-tauri/binaries
          # yt-dlp
          curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o src-tauri/binaries/yt-dlp-${{ matrix.target }}
          chmod +x src-tauri/binaries/yt-dlp-${{ matrix.target }}
          # ffmpeg + ffprobe (already installed via system dependencies above)
          cp "$(which ffmpeg)" src-tauri/binaries/ffmpeg-${{ matrix.target }}
          cp "$(which ffprobe)" src-tauri/binaries/ffprobe-${{ matrix.target }}

      - name: Download sidecar binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          # yt-dlp
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" `
            -OutFile "src-tauri/binaries/yt-dlp-${{ matrix.target }}.exe"
            # ffmpeg — BtbN static build
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" `
            -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $ffmpegExe = Get-ChildItem -Path ffmpeg_tmp -Filter ffmpeg.exe -Recurse | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName "src-tauri/binaries/ffmpeg-${{ matrix.target }}.exe"
          $ffprobeExe = Get-ChildItem -Path ffmpeg_tmp -Filter ffprobe.exe -Recurse | Select-Object -First 1
          Copy-Item $ffprobeExe.FullName "src-tauri/binaries/ffprobe-${{ matrix.target }}.exe"
          Remove-Item ffmpeg.zip, ffmpeg_tmp -Recurse -Force

      # ─────────────────────────────────────────────────────────────────────────

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing (optional)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          TARGET="${{ matrix.target }}"
          FRIENDLY="${{ matrix.friendly }}"
          REPO="${{ github.repository }}"

          case "$FRIENDLY" in
            macos-*)
              src=$(ls src-tauri/target/$TARGET/release/bundle/dmg/*.dmg | head -1)
              dest="Wavesplit-${VER}-${FRIENDLY}.dmg"
              cp "$src" "$dest"
              gh release upload "$TAG" "$dest" --repo "$REPO" --clobber
              ;;
            linux-*)
              src=$(ls src-tauri/target/$TARGET/release/bundle/appimage/*.AppImage | head -1)
              dest="Wavesplit-${VER}-${FRIENDLY}.AppImage"
              cp "$src" "$dest"
              gh release upload "$TAG" "$dest" --repo "$REPO" --clobber

              src=$(ls src-tauri/target/$TARGET/release/bundle/deb/*.deb | head -1)
              dest="Wavesplit-${VER}-${FRIENDLY}.deb"
              cp "$src" "$dest"
              gh release upload "$TAG" "$dest" --repo "$REPO" --clobber
              ;;
            windows-*)
              src=$(ls src-tauri/target/$TARGET/release/bundle/nsis/*.exe | head -1)
              dest="Wavesplit-${VER}-${FRIENDLY}.exe"
              cp "$src" "$dest"
              gh release upload "$TAG" "$dest" --repo "$REPO" --clobber
              ;;
          esac
