name: Build Demucs Sidecar

# Run manually or when the Python dependencies change.
# Produces per-platform frozen binaries and uploads them to the
# "demucs-sidecar" release so the app can download them at first run.
on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: demucs-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: demucs-macos-x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset: demucs-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: demucs-windows-x86_64

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # CPU-only torch is ~200MB installed vs ~2GB for GPU builds.
      # Demucs runs fine on CPU — just slower than GPU.
      - name: Install CPU-only PyTorch
        run: |
          pip install torch==2.5.0 torchaudio==2.5.0 --index-url https://download.pytorch.org/whl/cpu

      - name: Install demucs + PyInstaller
        run: pip install "numpy<2" demucs pyinstaller soundfile

      - name: Freeze with PyInstaller
        working-directory: python
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --collect-all demucs \
            --collect-all certifi \
            --collect-all soundfile \
            --collect-binaries torch \
            --name ${{ matrix.asset }} \
            demucs_runner.py

      - name: Compute SHA-256
        shell: bash
        run: |
          cd python/dist
          sha256sum ${{ matrix.asset }}* 2>/dev/null || shasum -a 256 ${{ matrix.asset }}* | awk '{print $1, $2}' | sed 's|  *| |'
          sha256sum ${{ matrix.asset }}* 2>/dev/null > ${{ matrix.asset }}.sha256 || \
            shasum -a 256 ${{ matrix.asset }}* | awk '{print $1"  "$2}' > ${{ matrix.asset }}.sha256

      # Ensure the release exists, then upload (--clobber replaces existing assets).
      - name: Upload binary and checksum to sidecar release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release view demucs-sidecar 2>/dev/null || \
            gh release create demucs-sidecar \
              --title "Demucs Sidecar Binaries" \
              --notes "Auto-built frozen demucs binaries. The app downloads these on first run. Do not delete." \
              --prerelease

          gh release upload demucs-sidecar \
            python/dist/${{ matrix.asset }}* \
            --clobber

  collect-checksums:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download per-platform checksum files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download demucs-sidecar \
            --repo ${{ github.repository }} \
            --pattern '*.sha256' \
            --dir checksums

      - name: Merge into checksums.txt and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat checksums/*.sha256 | sort > checksums.txt
          echo "checksums.txt:"
          cat checksums.txt
          gh release upload demucs-sidecar checksums.txt --clobber --repo ${{ github.repository }}

      - name: Remove per-platform .sha256 assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in checksums/*.sha256; do
            name=$(basename "$f")
            gh release delete-asset demucs-sidecar "$name" --yes --repo ${{ github.repository }}
          done
